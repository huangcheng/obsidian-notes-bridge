name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build, attest and release (e.g. 0.2.2). Leave empty when triggered by a tag push.'
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build, attest and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_REF_NAME}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building + releasing tag: $TAG"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify release artifacts exist
        shell: bash
        run: |
          test -f main.js
          test -f manifest.json
          test -f styles.css

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists; uploading (clobber) the attested artifacts."
            gh release upload "$TAG" main.js manifest.json styles.css --clobber
          else
            echo "Creating release $TAG with the attested artifacts."
            gh release create "$TAG" main.js manifest.json styles.css --title "$TAG" --generate-notes
          fi
